<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KYNAR LAB // EXP-001</title>
  <link rel="stylesheet" href="../assets/css/core.css">
  <style>
    body {
      background: var(--bg);
      overflow: hidden;
      height: 100vh;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .exp-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--space-lg);
      background: linear-gradient(180deg, rgba(6,6,10,0.9) 0%, transparent 100%);
      z-index: 10;
    }

    .exp-header__info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .exp-header__id {
      font-family: var(--font-terminal);
      font-size: var(--text-xs);
      color: var(--accent);
      letter-spacing: 0.2em;
    }

    .exp-header__name {
      font-family: var(--font-ui);
      font-size: var(--text-sm);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-bright);
    }

    .exp-back {
      font-family: var(--font-terminal);
      font-size: var(--text-xs);
      color: var(--text-dim);
      text-decoration: none;
      letter-spacing: 0.1em;
      transition: color var(--transition-fast);
    }

    .exp-back:hover { color: var(--silver); }

    .exp-hint {
      position: fixed;
      bottom: var(--space-lg);
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-terminal);
      font-size: var(--text-xs);
      color: var(--text-dim);
      letter-spacing: 0.15em;
      text-align: center;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <header class="exp-header">
    <div class="exp-header__info">
      <div class="exp-header__id">EXP-001</div>
      <div class="exp-header__name">Particle Field</div>
    </div>
    <a href="index.html" class="exp-back">← Back to Lab</a>
  </header>

  <p class="exp-hint">Move cursor / touch to interact</p>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    let W, H, mouse = { x: -9999, y: -9999 };
    const PARTICLE_COUNT = window.innerWidth < 600 ? 80 : 160;
    let particles = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Mouse / touch
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('touchmove', e => {
      e.preventDefault();
      mouse.x = e.touches[0].clientX;
      mouse.y = e.touches[0].clientY;
    }, { passive: false });

    function rand(min, max) { return Math.random() * (max - min) + min; }

    class Particle {
      constructor() { this.reset(true); }

      reset(initial = false) {
        this.x  = rand(0, W);
        this.y  = initial ? rand(0, H) : -10;
        this.vx = rand(-0.3, 0.3);
        this.vy = rand(0.2, 0.8);
        this.size = rand(1, 3);
        this.opacity = rand(0.3, 0.9);
        this.life = 1;
        this.decay = rand(0.001, 0.003);
        // Colour: crimson or silver
        this.colour = Math.random() > 0.7
          ? `rgba(192,21,42,${this.opacity})`
          : `rgba(200,208,216,${this.opacity * 0.4})`;
      }

      update() {
        // Mouse repulsion
        const dx = this.x - mouse.x;
        const dy = this.y - mouse.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 120) {
          const force = (120 - dist) / 120;
          this.vx += (dx / dist) * force * 0.8;
          this.vy += (dy / dist) * force * 0.8;
        }

        // Damping
        this.vx *= 0.97;
        this.vy *= 0.97;
        this.vy += 0.01; // slight gravity

        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;

        if (this.y > H + 10 || this.x < -10 || this.x > W + 10 || this.life <= 0) {
          this.reset();
        }
      }

      draw() {
        ctx.globalAlpha = this.life * this.opacity;
        ctx.fillStyle = this.colour;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Initialise particles
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push(new Particle());
    }

    // Connection lines between nearby particles
    function drawConnections() {
      const maxDist = 80;
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < maxDist) {
            const alpha = (1 - dist/maxDist) * 0.15;
            ctx.globalAlpha = alpha;
            ctx.strokeStyle = `rgba(192,21,42,1)`;
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
    }

    function loop() {
      ctx.globalAlpha = 1;
      ctx.fillStyle = 'rgba(6,6,10,0.15)';
      ctx.fillRect(0, 0, W, H);

      drawConnections();
      particles.forEach(p => { p.update(); p.draw(); });

      ctx.globalAlpha = 1;
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
