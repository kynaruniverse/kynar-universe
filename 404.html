<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KYNAR // ACCESS DENIED</title>
  <link rel="stylesheet" href="assets/css/core.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .denied {
      text-align: center;
      padding: var(--space-lg);
      position: relative;
      z-index: 1;
    }

    .denied__code {
      font-family: var(--font-ui);
      font-size: clamp(5rem, 20vw, 12rem);
      font-weight: 700;
      color: rgba(192,21,42,0.08);
      letter-spacing: 0.05em;
      line-height: 1;
      margin-bottom: var(--space-lg);
      position: relative;
    }

    .denied__code::after {
      content: '404';
      position: absolute;
      inset: 0;
      color: var(--accent);
      animation: glitch404 3s ease infinite;
    }

    @keyframes glitch404 {
      0%, 90%, 100% { clip-path: none; transform: none; opacity: 0.08; }
      91% { clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%); transform: translateX(-4px); opacity: 0.5; }
      92% { clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%); transform: translateX(4px); opacity: 0.5; }
      93% { clip-path: none; transform: none; opacity: 0.08; }
      95% { clip-path: polygon(0 10%, 100% 10%, 100% 30%, 0 30%); transform: translateX(-2px); opacity: 0.3; }
      96% { clip-path: none; transform: none; opacity: 0.08; }
    }

    .denied__title {
      font-family: var(--font-terminal);
      font-size: var(--text-xl);
      color: var(--accent);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: var(--space-md);
    }

    .denied__msg {
      font-family: var(--font-terminal);
      font-size: var(--text-sm);
      color: var(--text-dim);
      letter-spacing: 0.1em;
      margin-bottom: var(--space-xl);
      line-height: 1.8;
    }

    .denied__msg span { color: var(--silver); }

    .denied__terminal {
      font-family: var(--font-terminal);
      font-size: var(--text-xs);
      color: var(--text-dim);
      margin-bottom: var(--space-xl);
      text-align: left;
      display: inline-block;
      border-left: 2px solid var(--accent-dim);
      padding-left: var(--space-md);
    }

    .denied__terminal p { margin-bottom: 4px; letter-spacing: 0.05em; }
    .denied__terminal p span { color: var(--accent); }
  </style>
</head>
<body class="scanlines noise">
  <div class="k-grid-bg" aria-hidden="true"></div>

  <div class="denied">
    <div class="denied__code" aria-hidden="true">404</div>
    <h1 class="denied__title">Node Not Found</h1>
    <p class="denied__msg">
      The path you requested does not exist in this system.<br>
      <span>ACCESS DENIED.</span>
    </p>

    <div class="denied__terminal">
      <p>ERROR: <span>PATH_RESOLVE_FAILURE</span></p>
      <p>NODE: <span>NOT FOUND</span></p>
      <p>ACTION: <span>RETURN TO SAFE ZONE</span></p>
    </div>

    <br>
    <a href="hub.html" class="k-btn"><span>Return to Hub</span></a>
  </div>

  <div class="page-transition" id="pageTransition"></div>

  <script>
    document.querySelectorAll('a[href]').forEach(link => {
      link.addEventListener('click', e => {
        const href = link.getAttribute('href');
        if (href && !href.startsWith('#')) {
          e.preventDefault();
          const overlay = document.getElementById('pageTransition');
          overlay.classList.add('active');
          setTimeout(() => { window.location.href = href; }, 400);
        }
      });
    });
  </script>
</body>
</html>
